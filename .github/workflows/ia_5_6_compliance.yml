name: IA-5(6) GitHub Compliance Check

on:
  workflow_dispatch:
    inputs:
      owner:
        description: "GitHub organization/owner"
        required: false
        type: string
      repo:
        description: "Repository name"
        required: false
        type: string
      branch:
        description: "Branch to evaluate"
        required: false
        default: "main"
        type: string
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  compliance:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      security-events: read
      pull-requests: read
      id-token: write

    env:
      # Prefer a dedicated read token for cross-repository or org-level inspection.
      # If GH_READ_TOKEN is not configured, github.token is used as a fallback.
      GITHUB_TOKEN: ${{ secrets.GH_READ_TOKEN || github.token }}
      OWNER: ${{ inputs.owner || github.repository_owner }}
      REPO: ${{ inputs.repo || github.event.repository.name }}
      BRANCH: ${{ inputs.branch || github.event.repository.default_branch || 'main' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install --upgrade pip requests

      - name: Run IA-5(6) compliance check
        run: |
          python ia_5_6_compliance.py \
            --owner "$OWNER" \
            --repo "$REPO" \
            --branch "$BRANCH" \
            --output-dir compliance-output

      - name: Upload compliance artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ia-5-6-compliance-artifacts
          path: compliance-output/
          if-no-files-found: error
