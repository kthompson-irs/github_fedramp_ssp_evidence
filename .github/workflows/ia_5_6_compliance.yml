name: IA-5(6) Enterprise Compliance Check

on:
  workflow_dispatch:
    inputs:
      scope:
        description: "Scan scope"
        required: true
        default: "enterprise"
        type: choice
        options:
          - repo
          - org
          - enterprise
      enterprise_slug:
        description: "Enterprise slug (required for enterprise scope)"
        required: false
        type: string
      orgs:
        description: "Comma-separated org list (used only for org or repo scope)"
        required: false
        type: string
      repo:
        description: "Single repo name (used only for repo scope)"
        required: false
        type: string
      branch:
        description: "Branch to evaluate for repo scope"
        required: false
        default: "main"
        type: string
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  compliance:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      actions: read
      security-events: read
      pull-requests: read
      id-token: write

    env:
      GH_ENTERPRISE_TOKEN: ${{ secrets.GH_ENTERPRISE_TOKEN }}
      SCOPE: ${{ inputs.scope || 'enterprise' }}
      ENTERPRISE_SLUG: ${{ inputs.enterprise_slug || '' }}
      ORGS: ${{ inputs.orgs || '' }}
      REPO: ${{ inputs.repo || github.event.repository.name }}
      BRANCH: ${{ inputs.branch || github.event.repository.default_branch || 'main' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install --upgrade pip requests reportlab

      - name: Run IA-5(6) enterprise compliance check
        run: |
          python ia_5_6_compliance.py \
            --scope "$SCOPE" \
            --enterprise-slug "$ENTERPRISE_SLUG" \
            --orgs "$ORGS" \
            --repo "$REPO" \
            --branch "$BRANCH" \
            --output-dir compliance-output

      - name: Upload compliance artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ia-5-6-enterprise-compliance-artifacts
          path: compliance-output/
          if-no-files-found: error
