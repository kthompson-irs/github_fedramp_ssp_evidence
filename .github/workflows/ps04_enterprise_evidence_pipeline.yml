name: PS-04 Enterprise Evidence Pipeline (Streaming)

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ps04:
    runs-on: ubuntu-22.04

    env:
      SLA_MINUTES: 60

      TERMINATIONS_SOURCE: data/terminations_source.csv
      TERMINATIONS_FILE: data/terminations.csv

      S3_BUCKET: ${{ secrets.PS04_S3_BUCKET }}

      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      OUTPUT_FILE: ps04_report.json

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11.8"

      - name: Install dependencies
        run: pip install boto3

      # 🔹 Build dataset
      - name: Build termination dataset
        run: |
          set -euo pipefail
          python scripts/build_terminations_csv.py \
            --source "$TERMINATIONS_SOURCE" \
            --output "$TERMINATIONS_FILE"

      # 🔹 Pull latest audit evidence from S3
      - name: Fetch latest audit log from S3
        run: |
          set -euo pipefail

          mkdir -p data

          LATEST=$(aws s3 ls s3://$S3_BUCKET/ps04/ | sort | tail -n 1 | awk '{print $4}')

          if [ -z "$LATEST" ]; then
            echo "No audit logs found in S3"
            exit 1
          fi

          aws s3 cp s3://$S3_BUCKET/ps04/$LATEST data/enterprise_audit_log.json

      # 🔹 Run checker
      - name: Run PS-04 checker
        run: |
          set -euo pipefail

          python scripts/github_ps04_checker.py \
            --terminations "$TERMINATIONS_FILE" \
            --enterprise-audit-log data/enterprise_audit_log.json \
            --sla-minutes "$SLA_MINUTES" \
            --fail-on-gaps \
            --output "$OUTPUT_FILE"

      - name: Show report
        run: cat ps04_report.json

      - uses: actions/upload-artifact@v4
        with:
          name: ps04-report
          path: ps04_report.json
