name: FedRAMP IA-2(8) Enterprise Evidence

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest

    env:
      GH_APP_ID: ${{ secrets.GH_APP_ID }}
      GH_APP_PRIVATE_KEY: ${{ secrets.GH_APP_PRIVATE_KEY }}
      GH_ENTERPRISE: internal-revenue-service
      SINCE_DAYS: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install requests pyjwt cryptography

      - name: Run collector
        id: collect
        run: |
          set -euo pipefail
          python github_enterprise_ia208_collector.py

      - name: Generate report
        run: |
          python fedramp_ia208_report.py --run-dir artifacts

      - name: Add summary
        run: |
          set -euo pipefail
          if [ -f "artifacts/ia_enterprise_report.md" ]; then
            cat artifacts/ia_enterprise_report.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "IA enterprise report not generated." >> "$GITHUB_STEP_SUMMARY"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: evidence
          path: artifacts
