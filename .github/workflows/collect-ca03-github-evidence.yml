name: Collect CA-03 GitHub Evidence

on:
  workflow_dispatch:
    inputs:
      org:
        description: GitHub organization name
        required: true
        type: string

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests

      - name: Run collector
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          python ca03_github_collector.py \
            --org "${{ inputs.org }}" \
            --include-audit-log \
            --include-webhooks \
            --include-secret-scanning \
            --include-dependabot \
            --outdir "ca03_github_evidence"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ca03-github-evidence
          path: |
            ca03_github_evidence*
