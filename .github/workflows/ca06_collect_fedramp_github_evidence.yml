name: CA06 Collect FedRAMP GitHub Evidence

on:
  workflow_dispatch:
    inputs:
      org:
        description: GitHub organization login
        required: true
        type: string
      out_dir:
        description: Output folder name under the workspace
        required: false
        default: ca06_evidence
        type: string
  schedule:
    - cron: "0 9 * * 1"

permissions:
  contents: read

jobs:
  collect:
    runs-on: ubuntu-latest

    env:
      GH_TOKEN: ${{ secrets.GH__TOKEN }}
      GH_ORG: ${{ inputs.org }}
      OUT_DIR: ${{ inputs.out_dir }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Collect GitHub evidence
        run: |
          python scripts/collect_fedramp_github_evidence.py \
            --org "${GH_ORG}" \
            --out "${OUT_DIR}"

      - name: Upload evidence artifact
        uses: actions/upload-artifact@v4
        with:
          name: github-fedramp-evidence
          path: ${{ inputs.out_dir }}
          if-no-files-found: error
          retention-days: 90
