name: GitHub Enterprise Security Alerts to POA&M

on:
  workflow_dispatch:
    inputs:
      gh_enterprise:
        description: "GitHub enterprise slug"
        required: false
        type: string
  schedule:
    - cron: "0 5 * * 1"

permissions:
  contents: read
  issues: write

jobs:
  generate-poam:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      GH_TOKEN: ${{ secrets.GH_ENTERPRISE_TOKEN }}
      GH_ENTERPRISE: ${{ github.event_name == 'workflow_dispatch' && inputs.gh_enterprise || vars.GH_ENTERPRISE }}
      GH_API_URL: https://api.github.com
      GH_API_VERSION: 2022-11-28
      OUTPUT_DIR: poam-output
      OUTPUT_CSV: poam-output/poam_github.csv
      OUTPUT_JSON: poam-output/poam_github.json
      OUTPUT_SUMMARY: poam-output/poam_summary.json

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests

      - name: Validate inputs
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "GH_ENTERPRISE_TOKEN secret is missing." >&2
            exit 1
          fi

          if [ -z "$GH_ENTERPRISE" ]; then
            echo "GH_ENTERPRISE is missing. Set vars.GH_ENTERPRISE or pass gh_enterprise on workflow_dispatch." >&2
            exit 1
          fi

      - name: Run generator
        run: |
          mkdir -p "$OUTPUT_DIR"
          python ./github_to_poam_sync.py
          echo "Output directory contents:"
          ls -lah "$OUTPUT_DIR"

      - name: Create issue for HIGH findings
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summaryPath = process.env.OUTPUT_SUMMARY;

            if (!fs.existsSync(summaryPath)) {
              core.info("No summary found; skipping issue creation.");
              return;
            }

            const summary = JSON.parse(fs.readFileSync(summaryPath, 'utf8'));

            if (!summary.high_count || summary.high_count === 0) {
              core.info("No HIGH findings.");
              return;
            }

            const [owner, repo] = process.env.GITHUB_REPOSITORY.split('/');
            const title = `High POA&M findings (${summary.enterprise})`;
            const body = [
              `# High POA&M findings`,
              ``,
              `- Enterprise: \`${summary.enterprise}\``,
              `- Total rows: ${summary.total_count}`,
              `- HIGH rows: ${summary.high_count}`,
              ``,
              `## HIGH findings`,
              ``,
              ...(summary.high_rows || []).slice(0, 25).map(r =>
                `- **${r.poam_id}** | ${r.weakness_name} | severity=${r.severity} | asset=${r.asset_identifier} | source=${r.source_url}`
              )
            ].join('\n');

            const existing = await github.rest.search.issuesAndPullRequests({
              q: `repo:${owner}/${repo} is:issue is:open in:title "${title}"`
            });

            if (existing.data.total_count > 0) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existing.data.items[0].number,
                body
              });
            } else {
              await github.rest.issues.create({
                owner,
                repo,
                title,
                body
              });
            }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: poam-github-output
          path: poam-output/

      - name: Fail conditions
        run: |
          python - <<'PY'
          import json, os, sys
          from pathlib import Path

          p = Path(os.environ["OUTPUT_SUMMARY"])
          if not p.exists():
              sys.exit("Missing summary")

          s = json.loads(p.read_text())
          if s.get("source_errors"):
              print("Source errors:", s["source_errors"], file=sys.stderr)
              sys.exit(1)

          if s.get("total_count", 0) == 0:
              sys.exit("No alerts found")

          print("Success:", s["total_count"])
          PY
