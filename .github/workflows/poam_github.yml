name: FedRAMP POA&M from Audit Findings

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  generate-poam:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      GH_TOKEN: ${{ secrets.GH_GITHUB_TOKEN }}
      GH_OWNER: ${{ vars.GH_OWNER }}
      GH_REPO: ${{ vars.GH_REPO }}
      GH_ENTERPRISE_SLUG: ${{ vars.GH_ENTERPRISE_SLUG }}
      GH_API_URL: https://api.github.com
      GH_API_VERSION: 2022-11-28
      OUTPUT_DIR: poam-output
      OUTPUT_CSV: poam-output/poam_github.csv
      OUTPUT_JSON: poam-output/poam_github.json
      OUTPUT_SUMMARY: poam-output/poam_summary.json
      OUTPUT_XLSX: poam-output/fedramp_poam_populated.xlsx
      AUDIT_FINDINGS_JSON: findings.json

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install openpyxl

      - name: Verify findings file exists
        run: |
          if [ ! -f "$AUDIT_FINDINGS_JSON" ]; then
            echo "Missing findings file: $AUDIT_FINDINGS_JSON" >&2
            exit 1
          fi

      - name: Run POA&M export
        run: |
          mkdir -p "$OUTPUT_DIR"
          python ./github_to_poam_sync.py
          echo "Output directory contents:"
          ls -lah "$OUTPUT_DIR"

      - name: Summarize output
        if: always()
        run: |
          {
            echo "## FedRAMP POA&M output"
            echo
            echo "Owner: $GH_OWNER"
            if [ -n "$GH_REPO" ]; then
              echo "Repository: $GH_REPO"
            else
              echo "Repository: org-level scan"
            fi
            if [ -n "$GH_ENTERPRISE_SLUG" ]; then
              echo "Enterprise slug: $GH_ENTERPRISE_SLUG"
            fi
            echo
            echo "Files created:"
            if [ -f "$OUTPUT_CSV" ]; then
              echo "- $OUTPUT_CSV"
            fi
            if [ -f "$OUTPUT_JSON" ]; then
              echo "- $OUTPUT_JSON"
            fi
            if [ -f "$OUTPUT_SUMMARY" ]; then
              echo "- $OUTPUT_SUMMARY"
            fi
            if [ -f "$OUTPUT_XLSX" ]; then
              echo "- $OUTPUT_XLSX"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: poam-output
          path: poam-output/
          if-no-files-found: error
