name: FedRAMP POA&M from Audit Findings

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  generate-poam:
    runs-on: ubuntu-latest

    env:
      GH_TOKEN: ${{ secrets.GH_GITHUB_TOKEN }}
      GH_OWNER: ${{ vars.GH_OWNER }}
      GH_REPO: ${{ vars.GH_REPO }}
      OUTPUT_DIR: poam-output
      OUTPUT_CSV: poam-output/poam_github.csv
      OUTPUT_JSON: poam-output/poam_github.json
      OUTPUT_SUMMARY: poam-output/poam_summary.json
      OUTPUT_XLSX: poam-output/fedramp_poam_populated.xlsx
      AUDIT_FINDINGS_JSON: findings.json

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install openpyxl

      - name: Verify findings file exists
        run: |
          if [ ! -f "$AUDIT_FINDINGS_JSON" ]; then
            echo "Missing findings.json — audit parser must run first"
            exit 1
          fi

      - name: Run POA&M export
        run: |
          mkdir -p "$OUTPUT_DIR"
          python github_to_poam_sync.py
          echo "Output directory:"
          ls -lah "$OUTPUT_DIR"

      - name: Summarize output (safe)
        if: always()
        run: |
          {
            echo "## FedRAMP POA&M output"
            echo
            echo "Owner: $GH_OWNER"
            echo "Repository: ${GH_REPO:-org-level}"
            echo
            echo "Files:"
            for f in "$OUTPUT_CSV" "$OUTPUT_JSON" "$OUTPUT_SUMMARY" "$OUTPUT_XLSX"; do
              if [ -f "$f" ]; then
                echo "✔ $f"
              else
                echo "✖ $f (missing)"
              fi
            done
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: poam-output
          path: poam-output/
