name: GitHub Security Alerts to POA&M

on:
  workflow_dispatch:
    inputs:
      github_owner:
        description: "GitHub owner or organization login"
        required: false
        type: string
      github_repo:
        description: "Optional repository name; leave blank for org-level code scanning alerts"
        required: false
        type: string
  schedule:
    - cron: "0 5 * * 1"

permissions:
  contents: read

jobs:
  generate-poam:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      GITHUB_TOKEN: ${{ secrets.GH_GITHUB_TOKEN }}
      GITHUB_OWNER: ${{ github.event_name == 'workflow_dispatch' && inputs.github_owner || vars.GITHUB_OWNER }}
      GITHUB_REPO: ${{ github.event_name == 'workflow_dispatch' && inputs.github_repo || vars.GITHUB_REPO }}
      GITHUB_API_VERSION: 2022-11-28
      OUTPUT_DIR: poam-output
      OUTPUT_CSV: poam-output/poam_github.csv
      OUTPUT_JSON: poam-output/poam_github.json

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests

      - name: Validate required inputs
        run: |
          if [ -z "$GITHUB_TOKEN" ]; then
            echo "GH_GITHUB_TOKEN secret is missing." >&2
            exit 1
          fi

          if [ -z "$GITHUB_OWNER" ]; then
            echo "GITHUB_OWNER is missing. Set vars.GITHUB_OWNER or pass github_owner on workflow_dispatch." >&2
            exit 1
          fi

      - name: Run POA&M generator
        run: |
          mkdir -p "$OUTPUT_DIR"
          python ./github_to_poam_sync.py
          echo "Workspace contents:"
          ls -lah
          echo "Output directory contents:"
          ls -lah "$OUTPUT_DIR"

      - name: Summarize output
        if: always()
        run: |
          {
            echo "## GitHub POA&M output"
            echo
            echo "Owner: $GITHUB_OWNER"
            if [ -n "$GITHUB_REPO" ]; then
              echo "Repository: $GITHUB_REPO"
            else
              echo "Repository: org-level scan"
            fi
            echo
            echo "Files created:"
            [ -f "$OUTPUT_CSV" ] && echo "- $OUTPUT_CSV"
            [ -f "$OUTPUT_JSON" ] && echo "- $OUTPUT_JSON"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload POA&M artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: poam-github-output
          path: poam-output/
          if-no-files-found: error
