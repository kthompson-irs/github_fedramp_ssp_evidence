name: FedRAMP POA&M from Audit Findings

on:
  workflow_dispatch:
    inputs:
      gh_owner:
        description: "Organization login"
        required: false
        type: string
      gh_enterprise_slug:
        description: "Enterprise slug"
        required: false
        type: string
      use_enterprise_audit_log:
        description: "Try enterprise audit log first, then fall back to org audit log"
        required: false
        default: false
        type: boolean
      include_routine_actions:
        description: "Include routine workflow/comment/PR actions in findings"
        required: false
        default: false
        type: boolean
      audit_days:
        description: "How many days of audit log to collect"
        required: false
        default: "90"
        type: string
      poam_template_path:
        description: "Optional path to a FedRAMP POA&M Excel template in the repo"
        required: false
        type: string

  schedule:
    - cron: "0 5 * * 1"

permissions:
  contents: read

jobs:
  generate-poam:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      GH_TOKEN: ${{ secrets.GH_GITHUB_TOKEN }}
      GH_OWNER: ${{ github.event_name == 'workflow_dispatch' && inputs.gh_owner || vars.GH_OWNER }}
      GH_ENTERPRISE_SLUG: ${{ github.event_name == 'workflow_dispatch' && inputs.gh_enterprise_slug || vars.GH_ENTERPRISE_SLUG }}
      USE_ENTERPRISE_AUDIT_LOG: ${{ github.event_name == 'workflow_dispatch' && inputs.use_enterprise_audit_log || vars.USE_ENTERPRISE_AUDIT_LOG || 'false' }}
      INCLUDE_ROUTINE_ACTIONS: ${{ github.event_name == 'workflow_dispatch' && inputs.include_routine_actions || vars.INCLUDE_ROUTINE_ACTIONS || 'false' }}
      AUDIT_DAYS: ${{ github.event_name == 'workflow_dispatch' && inputs.audit_days || vars.AUDIT_DAYS || '90' }}
      POAM_TEMPLATE_PATH: ${{ github.event_name == 'workflow_dispatch' && inputs.poam_template_path || vars.POAM_TEMPLATE_PATH || '' }}
      GH_API_VERSION: 2022-11-28
      OUTPUT_DIR: poam-output
      AUDIT_LOG_JSONL: poam-output/audit.log.jsonl
      AUDIT_SOURCE_ERRORS_JSON: poam-output/audit_source_errors.json
      AUDIT_FINDINGS_JSON: poam-output/findings.json
      OUTPUT_CSV: poam-output/poam_github.csv
      OUTPUT_JSON: poam-output/poam_github.json
      OUTPUT_SUMMARY: poam-output/poam_summary.json
      OUTPUT_XLSX: poam-output/fedramp_poam_populated.xlsx

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests openpyxl

      - name: Fetch audit log
        run: |
          mkdir -p "$OUTPUT_DIR"
          python ./github_audit_log_fetch.py \
            --output "$AUDIT_LOG_JSONL" \
            --errors-output "$AUDIT_SOURCE_ERRORS_JSON"
          echo "Audit log files:"
          ls -lah "$OUTPUT_DIR"

      - name: Parse audit log into findings
        run: |
          if [ "${INCLUDE_ROUTINE_ACTIONS:-false}" = "true" ]; then
            python ./github_audit_log_parser.py \
              --input "$AUDIT_LOG_JSONL" \
              --output "$AUDIT_FINDINGS_JSON" \
              --include-routine-actions
          else
            python ./github_audit_log_parser.py \
              --input "$AUDIT_LOG_JSONL" \
              --output "$AUDIT_FINDINGS_JSON"
          fi
          echo "Findings created:"
          ls -lah "$AUDIT_FINDINGS_JSON"

      - name: Export POA&M package
        run: |
          python ./github_to_poam_sync.py
          echo "POA&M output:"
          ls -lah "$OUTPUT_DIR"

      - name: Summarize output
        if: always()
        run: |
          {
            echo "## FedRAMP POA&M output"
            echo
            echo "Owner: $GH_OWNER"
            if [ -n "$GH_ENTERPRISE_SLUG" ]; then
              echo "Enterprise slug: $GH_ENTERPRISE_SLUG"
            fi
            echo
            echo "Files created:"
            if [ -f "$OUTPUT_CSV" ]; then
              echo "- $OUTPUT_CSV"
            fi
            if [ -f "$OUTPUT_JSON" ]; then
              echo "- $OUTPUT_JSON"
            fi
            if [ -f "$OUTPUT_SUMMARY" ]; then
              echo "- $OUTPUT_SUMMARY"
            fi
            if [ -f "$OUTPUT_XLSX" ]; then
              echo "- $OUTPUT_XLSX"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: poam-output
          path: poam-output/
          if-no-files-found: error
