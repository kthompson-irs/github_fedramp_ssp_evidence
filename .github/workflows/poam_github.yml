name: GitHub Security Alerts to FedRAMP POA&M

on:
  workflow_dispatch:
    inputs:
      gh_owner:
        description: "GitHub owner or organization login"
        required: false
        type: string
      gh_repo:
        description: "Optional repository name"
        required: false
        type: string
      gh_enterprise_slug:
        description: "Optional enterprise slug"
        required: false
        type: string
  schedule:
    - cron: "0 5 * * 1"

permissions:
  contents: read

jobs:
  generate-poam:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      GH_TOKEN: ${{ secrets.GH_GITHUB_TOKEN }}
      GH_OWNER: ${{ github.event_name == 'workflow_dispatch' && inputs.gh_owner || vars.GH_OWNER }}
      GH_REPO: ${{ github.event_name == 'workflow_dispatch' && inputs.gh_repo || vars.GH_REPO }}
      GH_ENTERPRISE_SLUG: ${{ github.event_name == 'workflow_dispatch' && inputs.gh_enterprise_slug || vars.GH_ENTERPRISE_SLUG }}
      GH_API_URL: https://api.github.com
      GH_API_VERSION: 2022-11-28
      OUTPUT_DIR: poam-output
      OUTPUT_CSV: poam-output/poam_github.csv
      OUTPUT_JSON: poam-output/poam_github.json
      OUTPUT_SUMMARY: poam-output/poam_summary.json
      OUTPUT_XLSX: poam-output/fedramp_poam_populated.xlsx

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests openpyxl

      - name: Validate required inputs
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "GH_GITHUB_TOKEN secret is missing." >&2
            exit 1
          fi

          if [ -z "$GH_OWNER" ]; then
            echo "GH_OWNER is missing. Set vars.GH_OWNER or pass gh_owner on workflow_dispatch." >&2
            exit 1
          fi

      - name: Run FedRAMP POA&M export
        run: |
          mkdir -p "$OUTPUT_DIR"
          python ./github_to_poam_sync.py
          echo "Output directory contents:"
          ls -lah "$OUTPUT_DIR"

      - name: Summarize output
        if: always()
        run: |
          {
            echo "## FedRAMP POA&M output"
            echo
            echo "Owner: $GH_OWNER"
            if [ -n "$GH_REPO" ]; then
              echo "Repository: $GH_REPO"
            else
              echo "Repository: org-level scan"
            fi
            if [ -n "$GH_ENTERPRISE_SLUG" ]; then
              echo "Enterprise slug: $GH_ENTERPRISE_SLUG"
            fi
            echo
            echo "Files created:"
            [ -f "$OUTPUT_CSV" ] && echo "- $OUTPUT_CSV"
            [ -f "$OUTPUT_JSON" ] && echo "- $OUTPUT_JSON"
            [ -f "$OUTPUT_SUMMARY" ] && echo "- $OUTPUT_SUMMARY"
            [ -f "$OUTPUT_XLSX" ] && echo "- $OUTPUT_XLSX"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fedramp-poam-output
          path: poam-output/
          if-no-files-found: error
