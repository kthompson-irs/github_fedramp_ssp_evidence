name: SI-03 Evidence Collection

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * *"
  push:
    branches:
      - main
    paths:
      - "app/**"
      - ".github/workflows/si03-evidence.yml"

permissions:
  contents: read

concurrency:
  group: si03-evidence-${{ github.ref }}
  cancel-in-progress: true

jobs:
  collect-and-export:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run SI-03 collectors
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN_FEDRAMP }}
          GITHUB_ORG: ${{ vars.GITHUB_ORG }}
          GITHUB_REPOS: ${{ vars.GITHUB_REPOS }}

          AWS_REGION: ${{ vars.AWS_REGION }}
          AWS_PROFILE: ${{ vars.AWS_PROFILE }}

          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}

          GRAPH_TENANT_ID: ${{ secrets.GRAPH_TENANT_ID }}
          GRAPH_CLIENT_ID: ${{ secrets.GRAPH_CLIENT_ID }}
          GRAPH_CLIENT_SECRET: ${{ secrets.GRAPH_CLIENT_SECRET }}
          SHAREPOINT_SITE_ID: ${{ vars.SHAREPOINT_SITE_ID }}
          SHAREPOINT_LIST_ID: ${{ vars.SHAREPOINT_LIST_ID }}

          POWERBI_TENANT_ID: ${{ secrets.POWERBI_TENANT_ID }}
          POWERBI_CLIENT_ID: ${{ secrets.POWERBI_CLIENT_ID }}
          POWERBI_CLIENT_SECRET: ${{ secrets.POWERBI_CLIENT_SECRET }}
          POWERBI_GROUP_ID: ${{ vars.POWERBI_GROUP_ID }}
          POWERBI_DATASET_ID: ${{ vars.POWERBI_DATASET_ID }}

        run: |
          mkdir -p artifacts
          python -m app.runner > artifacts/collector-output.json

      - name: Upload evidence snapshot
        uses: actions/upload-artifact@v4
        with:
          name: si03-evidence-snapshot
          path: artifacts/
          if-no-files-found: error
