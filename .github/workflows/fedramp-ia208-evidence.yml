name: FedRAMP IA-2(8) Evidence Collection

on:
  workflow_dispatch:
    inputs:
      github_org:
        description: "GitHub organization login"
        required: false
        type: string
      github_enterprise:
        description: "Enterprise slug for optional enterprise checks"
        required: false
        type: string
      github_days:
        description: "How many days of audit log to collect"
        required: false
        default: "90"
        type: string
  schedule:
    - cron: "0 4 * * 1"

permissions:
  contents: read

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      GITHUB_TOKEN: ${{ secrets.GH_ORG_OWNER_TOKEN }}
      GITHUB_ORG: ${{ github.event_name == 'workflow_dispatch' && inputs.github_org || vars.GITHUB_ORG }}
      GITHUB_API_URL: https://api.github.com
      GITHUB_API_VERSION: 2022-11-28
      GITHUB_ENTERPRISE: ${{ github.event_name == 'workflow_dispatch' && inputs.github_enterprise || vars.GITHUB_ENTERPRISE }}
      GITHUB_DAYS: ${{ github.event_name == 'workflow_dispatch' && inputs.github_days || vars.GITHUB_DAYS || '90' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests

      - name: Write evidence collector
        run: |
          cat > fedramp_ia208_evidence.py <<'PY'
          #!/usr/bin/env python3
          """Collect FedRAMP evidence for GitHub.com IA-2(8) and adjacent controls.

          Outputs a timestamped folder containing:
          - org.json
          - audit_log.jsonl
          - audit_log.csv
          - credential_authorizations.json
          - installations.json
          - summary.json
          - manifest.md

          Required env vars:
          - GITHUB_TOKEN: GitHub PAT or App token with the required permissions
          - GITHUB_ORG: organization name

          Optional env vars:
          - GITHUB_API_URL: default https://api.github.com
          - GITHUB_API_VERSION: default 2022-11-28
          - GITHUB_ENTERPRISE: enterprise slug (enables optional enterprise audit stream checks)
          - GITHUB_DAYS: default 90; how many days of audit log to collect

          Notes:
          - The organization token must belong to an organization owner.
          - Organization audit log access and SAML SSO authorization listing require owner privileges.
          - Enterprise audit log streaming configuration checks are only attempted when GITHUB_ENTERPRISE is provided.
          """
          from __future__ import annotations

          import csv
          import datetime as dt
          import json
          import os
          import sys
          import time
          from dataclasses import dataclass
          from pathlib import Path
          from typing import Any, Dict, Iterable, List, Optional

          import requests


          @dataclass
          class GitHubConfig:
              token: str
              org: str
              api_url: str = "https://api.github.com"
              api_version: str = "2022-11-28"
              enterprise: Optional[str] = None
              days: int = 90
              timeout: int = 30


          class GitHubClient:
              def __init__(self, cfg: GitHubConfig) -> None:
                  self.cfg = cfg
                  self.session = requests.Session()
                  self.session.headers.update(
                      {
                          "Accept": "application/vnd.github+json",
                          "Authorization": f"Bearer {cfg.token}",
                          "X-GitHub-Api-Version": cfg.api_version,
                          "User-Agent": "fedramp-ia208-evidence-collector/1.0",
                      }
                  )

              def request(self, method: str, path: str, *, params: Optional[Dict[str, Any]] = None) -> requests.Response:
                  url = self.cfg.api_url.rstrip("/") + "/" + path.lstrip("/")
                  backoff = 2
                  for attempt in range(6):
                      resp = self.session.request(method, url, params=params, timeout=self.cfg.timeout)
                      if resp.status_code not in (403, 429):
                          return resp
                      retry_after = resp.headers.get("Retry-After")
                      if retry_after:
                          sleep_for = min(int(retry_after), 60)
                      else:
                          sleep_for = min(backoff, 60)
                          backoff *= 2
                      time.sleep(sleep_for)
                  return resp

              def get_json(self, path: str, *, params: Optional[Dict[str, Any]] = None) -> Any:
                  resp = self.request("GET", path, params=params)
                  if resp.status_code >= 400:
                      raise RuntimeError(f"GET {path} failed: {resp.status_code} {resp.text[:400]}")
                  return resp.json()

              def paginate(self, path: str, *, params: Optional[Dict[str, Any]] = None) -> Iterable[Any]:
                  params = dict(params or {})
                  params.setdefault("per_page", 100)
                  page = 1
                  while True:
                      page_params = dict(params)
                      page_params["page"] = page
                      resp = self.request("GET", path, params=page_params)
                      if resp.status_code >= 400:
                          raise RuntimeError(f"GET {path} page {page} failed: {resp.status_code} {resp.text[:400]}")
                      data = resp.json()
                      if isinstance(data, list):
                          for item in data:
                              yield item
                      else:
                          yield data
                      link = resp.headers.get("Link", "")
                      if 'rel="next"' not in link:
                          break
                      page += 1


          def iso_date_days_ago(days: int) -> str:
              return (dt.datetime.now(dt.timezone.utc) - dt.timedelta(days=days)).date().isoformat()


          def normalize_audit_event(event: Dict[str, Any]) -> Dict[str, Any]:
              created_at = event.get("created_at")
              if isinstance(created_at, (int, float)):
                  created_iso = dt.datetime.fromtimestamp(created_at / 1000.0, tz=dt.timezone.utc).isoformat()
              else:
                  created_iso = created_at
              return {
                  "created_at": created_iso,
                  "action": event.get("action"),
                  "actor": event.get("actor"),
                  "user": event.get("user"),
                  "org": event.get("org"),
                  "repo": event.get("repo"),
                  "team": event.get("team"),
                  "visibility": event.get("visibility"),
                  "ip": event.get("ip_address") or event.get("client_ip_address"),
                  "country_code": event.get("actor_location.country_code"),
                  "raw": event,
              }


          def write_json(path: Path, data: Any) -> None:
              path.write_text(json.dumps(data, indent=2, sort_keys=True), encoding="utf-8")


          def write_csv(path: Path, rows: List[Dict[str, Any]], fieldnames: List[str]) -> None:
              with path.open("w", newline="", encoding="utf-8") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow({k: row.get(k, "") for k in fieldnames})


          def build_manifest(output_dir: Path, files: List[Path]) -> None:
              lines = ["# Evidence Manifest", ""]
              lines.append(f"Generated: {dt.datetime.now(dt.timezone.utc).isoformat()}")
              lines.append("")
              for file_path in files:
                  rel = file_path.relative_to(output_dir)
                  lines.append(f"- {rel.as_posix()}")
              (output_dir / "manifest.md").write_text("\n".join(lines) + "\n", encoding="utf-8")


          def collect(cfg: GitHubConfig) -> Path:
              client = GitHubClient(cfg)
              stamp = dt.datetime.now(dt.timezone.utc).strftime("%Y%m%dT%H%M%SZ")
              output_dir = Path.cwd() / f"github_ia208_evidence_{stamp}"
              output_dir.mkdir(parents=True, exist_ok=True)

              files: List[Path] = []

              org = client.get_json(f"/orgs/{cfg.org}")
              org_path = output_dir / "org.json"
              write_json(org_path, org)
              files.append(org_path)

              # Organization SAML credential authorizations are useful evidence when SAML SSO is enabled.
              try:
                  cred_auths = list(client.paginate(f"/orgs/{cfg.org}/credential-authorizations"))
              except RuntimeError as exc:
                  cred_auths = {"error": str(exc)}
              cred_path = output_dir / "credential_authorizations.json"
              write_json(cred_path, cred_auths)
              files.append(cred_path)

              try:
                  installations = list(client.paginate(f"/orgs/{cfg.org}/installations"))
              except RuntimeError as exc:
                  installations = {"error": str(exc)}
              inst_path = output_dir / "installations.json"
              write_json(inst_path, installations)
              files.append(inst_path)

              # Collect audit log for the last N days. Use include=all so both web and git events are available.
              created_filter = f"created:>={iso_date_days_ago(cfg.days)}"
              audit_events: List[Dict[str, Any]] = []
              try:
                  for event in client.paginate(
                      f"/orgs/{cfg.org}/audit-log",
                      params={"include": "all", "phrase": created_filter, "per_page": 100, "order": "desc"},
                  ):
                      audit_events.append(normalize_audit_event(event))
              except RuntimeError as exc:
                  audit_events = [{"error": str(exc)}]

              audit_jsonl = output_dir / "audit_log.jsonl"
              with audit_jsonl.open("w", encoding="utf-8") as f:
                  for event in audit_events:
                      f.write(json.dumps(event, sort_keys=True))
                      f.write("\n")
              files.append(audit_jsonl)

              audit_csv = output_dir / "audit_log.csv"
              rows_for_csv = [e for e in audit_events if "error" not in e]
              csv_fields = ["created_at", "action", "actor", "user", "org", "repo", "team", "visibility", "ip", "country_code"]
              write_csv(audit_csv, rows_for_csv, csv_fields)
              files.append(audit_csv)

              summary: Dict[str, Any] = {
                  "org": cfg.org,
                  "api_url": cfg.api_url,
                  "days_collected": cfg.days,
                  "collected_at": dt.datetime.now(dt.timezone.utc).isoformat(),
                  "org_two_factor_requirement_enabled": org.get("two_factor_requirement_enabled"),
                  "org_has_saml_sso_authorizations_endpoint": True,
                  "credential_authorization_count": len(cred_auths) if isinstance(cred_auths, list) else None,
                  "installation_count": len(installations) if isinstance(installations, list) else None,
                  "audit_event_count": len(rows_for_csv),
                  "potential_gaps": [],
              }
              if not org.get("two_factor_requirement_enabled"):
                  summary["potential_gaps"].append("Organization 2FA requirement is not enabled.")
              if isinstance(cred_auths, dict) and cred_auths.get("error"):
                  summary["potential_gaps"].append("Could not retrieve credential authorizations; verify org owner permissions and SAML SSO configuration.")
              if isinstance(audit_events, list) and audit_events and "error" in audit_events[0]:
                  summary["potential_gaps"].append("Could not retrieve audit log; verify owner permissions and token scope.")

              # Filter for auth-related events useful for IA-2(8).
              auth_related = [
                  e for e in rows_for_csv
                  if any(
                      token in str(e.get("action", "")).lower()
                      for token in ("auth", "saml", "oauth", "token", "credential", "2fa", "mfa")
                  )
              ]
              summary["auth_related_event_count"] = len(auth_related)

              summary_path = output_dir / "summary.json"
              write_json(summary_path, summary)
              files.append(summary_path)

              build_manifest(output_dir, files)
              return output_dir


          def main() -> int:
              token = os.environ.get("GITHUB_TOKEN", "").strip()
              org = os.environ.get("GITHUB_ORG", "").strip()
              if not token or not org:
                  print("Set GITHUB_TOKEN and GITHUB_ORG before running.", file=sys.stderr)
                  return 2

              cfg = GitHubConfig(
                  token=token,
                  org=org,
                  api_url=os.environ.get("GITHUB_API_URL", "https://api.github.com").strip(),
                  api_version=os.environ.get("GITHUB_API_VERSION", "2022-11-28").strip(),
                  enterprise=os.environ.get("GITHUB_ENTERPRISE") or None,
                  days=int(os.environ.get("GITHUB_DAYS", "90")),
              )
              output_dir = collect(cfg)
              print(str(output_dir))
              return 0


          if __name__ == "__main__":
              raise SystemExit(main())
          PY
          chmod +x fedramp_ia208_evidence.py

      - name: Run collector
        id: run_collector
        run: |
          set -euo pipefail
          output_dir="$(python fedramp_ia208_evidence.py)"
          echo "output_dir=$output_dir" >> "$GITHUB_OUTPUT"

      - name: Add summary
        if: always()
        run: |
          {
            echo "## FedRAMP IA-2(8) evidence collection"
            echo
            echo "Organization: $GITHUB_ORG"
            echo "Days collected: $GITHUB_DAYS"
            echo "Output directory: ${{ steps.run_collector.outputs.output_dir }}"
            echo
            if [ -f "${{ steps.run_collector.outputs.output_dir }}/manifest.md" ]; then
              echo "### Manifest"
              echo '```'
              cat "${{ steps.run_collector.outputs.output_dir }}/manifest.md"
              echo '```'
            fi
            if [ -f "${{ steps.run_collector.outputs.output_dir }}/summary.json" ]; then
              echo "### Summary"
              echo '```json'
              cat "${{ steps.run_collector.outputs.output_dir }}/summary.json"
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload evidence artifact
        if: always() && steps.run_collector.outputs.output_dir != ''
        uses: actions/upload-artifact@v4
        with:
          name: fedramp-ia208-evidence
          path: ${{ steps.run_collector.outputs.output_dir }}
          if-no-files-found: error
