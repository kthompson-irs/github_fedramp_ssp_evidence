name: CA02 GitHub FedRAMP Audit Automation

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * 1"

jobs:
  build-evidence:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      OUTPUT_DIR: evidence
      GH_BRANCH: main

    defaults:
      run:
        working-directory: ${{ github.workspace }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify workspace
        run: |
          echo "Current directory:"
          pwd
          echo "Repo contents:"
          ls -la
          echo "Find automation script:"
          find . -maxdepth 3 -name 'ca02_audit_automation.py' -print

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests openpyxl

      - name: Run CA-02 audit automation
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GH_ORG: ${{ vars.GH_ORG }}
          GH_REPOS: ${{ vars.GH_REPOS }}
          GH_AUDIT_LOG_PHRASE: ${{ vars.GH_AUDIT_LOG_PHRASE }}
        run: |
          python ./ca02_audit_automation.py

      - name: Upload CA02 evidence archive
        uses: actions/upload-artifact@v4
        with:
          name: ca02-github-fedramp-evidence
          path: ca02-github-fedramp-evidence.zip
          if-no-files-found: error
