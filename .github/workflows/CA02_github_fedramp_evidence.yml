name: CA02 Collect GitHub FedRAMP Evidence

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * 1"

jobs:
  collect-evidence:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      OUTPUT_DIR: evidence
      GH_BRANCH: main

    defaults:
      run:
        working-directory: ${{ github.workspace }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify workspace
        run: |
          pwd
          ls -la
          find . -maxdepth 3 -name 'ca02_collect_github_evidence.py' -print

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Collect evidence
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GH_ORG: ${{ vars.GH_ORG }}
          GH_REPOS: ${{ vars.GH_REPOS }}
          GH_AUDIT_LOG_PHRASE: ${{ vars.GH_AUDIT_LOG_PHRASE }}
        run: |
          python ./collect_github_evidence.py

      - name: Upload evidence bundle
        uses: actions/upload-artifact@v4
        with:
          name: ca02_github-fedramp-evidence
          path: evidence
          if-no-files-found: warn
