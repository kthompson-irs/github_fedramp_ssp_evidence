name: CA02 Collect GitHub FedRAMP Evidence

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * 1"

jobs:
  collect-evidence:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      OUTPUT_DIR: evidence
      GH_BRANCH: main

    defaults:
      run:
        working-directory: ${{ github.workspace }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify workspace
        run: |
          pwd
          ls -la
          find . -name "ca02_collect_github_evidence.py"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run CA-02 Evidence Collector
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GH_ORG: ${{ vars.GH_ORG }}
          GH_REPOS: ${{ vars.GH_REPOS }}
          GH_AUDIT_LOG_PHRASE: ${{ vars.GH_AUDIT_LOG_PHRASE }}
        run: |
          python ./ca02_collect_github_evidence.py

      # 🔥 NEW: ZIP WITH CA02 NAME
      - name: Create CA02 Evidence Archive
        run: |
          zip -r ca02-github-fedramp-evidence.zip $OUTPUT_DIR

      - name: Upload CA02 Evidence Bundle
        uses: actions/upload-artifact@v4
        with:
          name: ca02-github-fedramp-evidence
          path: ca02-github-fedramp-evidence.zip
          if-no-files-found: error
