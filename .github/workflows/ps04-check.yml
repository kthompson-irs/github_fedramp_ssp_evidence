name: FedRAMP PS-04 GitHub Offboarding Verification

on:
  workflow_dispatch:
    inputs:
      sla_minutes:
        description: "PS-04 SLA in minutes"
        required: false
        default: "60"
      max_pages:
        description: "Max audit log pages to query"
        required: false
        default: "10"

  schedule:
    # Run every hour to continuously validate compliance
    - cron: "0 * * * *"

permissions:
  contents: read

jobs:
  ps04-check:
    name: Run PS-04 Compliance Check
    runs-on: ubuntu-latest

    env:
      PYTHON_SCRIPT: scripts/github_ps04_checker.py
      TERMINATIONS_FILE: data/terminations.csv
      OUTPUT_FILE: ps04_report.json
      ENTERPRISE_SLUG: ${{ secrets.GH_ENTERPRISE_SLUG }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_AUDIT_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate required files exist
        run: |
          if [ ! -f "$PYTHON_SCRIPT" ]; then
            echo "Missing Python script at $PYTHON_SCRIPT"
            exit 1
          fi

          if [ ! -f "$TERMINATIONS_FILE" ]; then
            echo "Missing termination file at $TERMINATIONS_FILE"
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run PS-04 verification script
        run: |
          python "$PYTHON_SCRIPT" \
            --terminations "$TERMINATIONS_FILE" \
            --enterprise "$ENTERPRISE_SLUG" \
            --token "$GITHUB_TOKEN" \
            --sla-minutes "${{ github.event.inputs.sla_minutes || '60' }}" \
            --max-pages "${{ github.event.inputs.max_pages || '10' }}" \
            --fail-on-gaps \
            --output "$OUTPUT_FILE"

      - name: Upload compliance report artifact
        uses: actions/upload-artifact@v4
        with:
          name: ps04-report
          path: ${{ env.OUTPUT_FILE }}

      - name: Display report summary
        run: |
          echo "==== PS-04 REPORT ===="
          cat "$OUTPUT_FILE"

      - name: Fail if gaps detected (explicit check)
        run: |
          GAP_COUNT=$(jq '.summary.gap_records' "$OUTPUT_FILE")
          echo "Gap count: $GAP_COUNT"

          if [ "$GAP_COUNT" -gt 0 ]; then
            echo "PS-04 NON-COMPLIANT: gaps detected"
            exit 1
          else
            echo "PS-04 compliant"
          fi
