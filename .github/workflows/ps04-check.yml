name: FedRAMP PS-04 GitHub Offboarding Verification

on:
  workflow_dispatch:
    inputs:
      sla_minutes:
        description: "PS-04 SLA in minutes"
        required: false
        default: "60"

  schedule:
    - cron: "0 * * * *"

permissions:
  contents: read

jobs:
  ps04-check:
    name: PS-04 Compliance Validation
    runs-on: ubuntu-22.04   # 🔒 pinned runner for determinism

    env:
      BUILD_SCRIPT: scripts/build_terminations_csv.py
      CHECK_SCRIPT: scripts/github_ps04_checker.py
      TERMINATIONS_FILE: data/terminations.csv
      SOURCE_FILE: data/terminations_source.csv
      OUTPUT_FILE: ps04_report.json
      SLA_MINUTES: ${{ github.event.inputs.sla_minutes || '60' }}

      GH_ENTERPRISE_SLUG: ${{ secrets.GH_ENTERPRISE_SLUG }}
      GH_AUDIT_TOKEN: ${{ secrets.GH_AUDIT_TOKEN }}

    steps:
      - name: Checkout (pinned)
        uses: actions/checkout@v4

      - name: Precheck
        shell: bash
        run: |
          set -euo pipefail

          echo "=== PRECHECK START ==="

          test -f "$BUILD_SCRIPT" || { echo "Missing build script"; exit 1; }
          test -f "$CHECK_SCRIPT" || { echo "Missing checker script"; exit 1; }

          if [ -z "${GH_ENTERPRISE_SLUG:-}" ]; then
            echo "Missing GH_ENTERPRISE_SLUG"
            exit 1
          fi

          if [ -z "${GH_AUDIT_TOKEN:-}" ]; then
            echo "Missing GH_AUDIT_TOKEN"
            exit 1
          fi

          mkdir -p data

          # Create controlled default only if missing
          if [ ! -f "$SOURCE_FILE" ]; then
            echo "Creating controlled template source file"
            printf '%s\n' \
              'employee_id,github_identity,termination_time_utc,identity_model,deadline_minutes' \
              'CONTROL,placeholder,1970-01-01T00:00:00Z,personal,60' \
              > "$SOURCE_FILE"
          fi

          echo "=== PRECHECK COMPLETE ==="

      - name: Setup Python (pinned)
        uses: actions/setup-python@v5
        with:
          python-version: "3.11.8"

      - name: Install dependencies (locked)
        run: |
          set -euo pipefail
          pip install --no-cache-dir requests==2.31.0

      - name: Build termination dataset
        run: |
          set -euo pipefail
          python "$BUILD_SCRIPT" \
            --source "$SOURCE_FILE" \
            --output "$TERMINATIONS_FILE" \
            --default-deadline-minutes "$SLA_MINUTES"

      - name: Validate dataset integrity
        run: |
          set -euo pipefail

          if [ ! -s "$TERMINATIONS_FILE" ]; then
            echo "Termination dataset empty"
            exit 1
          fi

          echo "Dataset hash:"
          sha256sum "$TERMINATIONS_FILE"

      - name: Run PS-04 compliance check
        run: |
          set -euo pipefail

          python "$CHECK_SCRIPT" \
            --terminations "$TERMINATIONS_FILE" \
            --enterprise "$GH_ENTERPRISE_SLUG" \
            --token "$GH_AUDIT_TOKEN" \
            --sla-minutes "$SLA_MINUTES" \
            --fail-on-gaps \
            --output "$OUTPUT_FILE"

      - name: Validate report integrity
        run: |
          set -euo pipefail

          if [ ! -s "$OUTPUT_FILE" ]; then
            echo "Missing compliance report"
            exit 1
          fi

          echo "Report hash:"
          sha256sum "$OUTPUT_FILE"

      - name: Display summary
        run: |
          echo "=== PS-04 REPORT ==="
          cat "$OUTPUT_FILE"

      - name: Upload artifact (evidence)
        uses: actions/upload-artifact@v4
        with:
          name: ps04-compliance-report
          path: ps04_report.json
          retention-days: 90   # 🔒 audit retention
