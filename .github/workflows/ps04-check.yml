- name: Precheck
  shell: bash
  run: |
    set -euo pipefail

    if [ ! -f "$BUILD_TERMINATIONS_SCRIPT" ]; then
      echo "Missing build script at $BUILD_TERMINATIONS_SCRIPT"
      exit 1
    fi

    if [ ! -f "$PYTHON_SCRIPT" ]; then
      echo "Missing Python script at $PYTHON_SCRIPT"
      exit 1
    fi

    if [ -z "${TERMINATIONS_JSON:-}" ] && [ ! -f "$TERMINATIONS_SOURCE" ]; then
      echo "No termination source found."
      echo "Either:"
      echo "  - commit data/terminations_source.csv, or"
      echo "  - provide the workflow_dispatch input terminations_json"
      exit 1
    fi

    if [ -z "${AUDIT_LOG_FILE:-}" ]; then
      if [ -z "${GH_ENTERPRISE_SLUG:-}" ]; then
        echo "Missing GH_ENTERPRISE_SLUG"
        exit 1
      fi

      if [ -z "${GH_AUDIT_TOKEN:-}" ]; then
        echo "Missing GH_AUDIT_TOKEN"
        exit 1
      fi
    fi

    mkdir -p data
