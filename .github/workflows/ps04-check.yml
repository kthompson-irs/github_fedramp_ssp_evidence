name: FedRAMP PS-04 GitHub Offboarding Verification

on:
  workflow_dispatch:
    inputs:
      sla_minutes:
        description: "PS-04 SLA in minutes"
        required: false
        default: "60"
      max_pages:
        description: "Max audit log pages to query"
        required: false
        default: "10"
      terminations_file:
        description: "Path to the termination CSV in the repo"
        required: false
        default: "data/terminations.csv"
      audit_log_file:
        description: "Optional local GitHub audit log export path; leave blank to query the GitHub API"
        required: false
        default: ""

  schedule:
    - cron: "0 * * * *"

permissions:
  contents: read

jobs:
  ps04-check:
    name: Run PS-04 Compliance Check
    runs-on: ubuntu-latest

    env:
      PYTHON_SCRIPT: scripts/github_ps04_checker.py
      TERMINATIONS_FILE: ${{ github.event.inputs.terminations_file || 'data/terminations.csv' }}
      AUDIT_LOG_FILE: ${{ github.event.inputs.audit_log_file || '' }}
      OUTPUT_FILE: ps04_report.json
      ENTERPRISE_SLUG: ${{ secrets.GH_ENTERPRISE_SLUG }}
      GITHUB_AUDIT_TOKEN: ${{ secrets.GITHUB_AUDIT_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Preflight checks
        shell: bash
        run: |
          set -euo pipefail

          if [ ! -f "$PYTHON_SCRIPT" ]; then
            echo "Missing Python script at $PYTHON_SCRIPT"
            exit 1
          fi

          if [ ! -f "$TERMINATIONS_FILE" ]; then
            echo "Missing termination file at $TERMINATIONS_FILE"
            echo "Commit the CSV to the repo, update the workflow input, or download it earlier in the job."
            exit 1
          fi

          if [ -z "${ENTERPRISE_SLUG:-}" ] && [ -z "${AUDIT_LOG_FILE:-}" ]; then
            echo "Missing GH_ENTERPRISE_SLUG secret, and no local audit log was provided."
            exit 1
          fi

          if [ -z "${GITHUB_AUDIT_TOKEN:-}" ] && [ -z "${AUDIT_LOG_FILE:-}" ]; then
            echo "Missing GITHUB_AUDIT_TOKEN secret for API mode."
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run PS-04 verification script
        shell: bash
        run: |
          set -euo pipefail

          SLA_MINUTES="${{ github.event.inputs.sla_minutes || '60' }}"
          MAX_PAGES="${{ github.event.inputs.max_pages || '10' }}"

          if [ -n "${AUDIT_LOG_FILE:-}" ]; then
            python "$PYTHON_SCRIPT" \
              --terminations "$TERMINATIONS_FILE" \
              --audit-log "$AUDIT_LOG_FILE" \
              --sla-minutes "$SLA_MINUTES" \
              --fail-on-gaps \
              --output "$OUTPUT_FILE"
          else
            python "$PYTHON_SCRIPT" \
              --terminations "$TERMINATIONS_FILE" \
              --enterprise "$ENTERPRISE_SLUG" \
              --token "$GITHUB_AUDIT_TOKEN" \
              --max-pages "$MAX_PAGES" \
              --sla-minutes "$SLA_MINUTES" \
              --fail-on-gaps \
              --output "$OUTPUT_FILE"
          fi

      - name: Display report summary
        shell: bash
        run: |
          set -euo pipefail
          echo "==== PS-04 REPORT ===="
          cat "$OUTPUT_FILE"

      - name: Upload compliance report artifact
        uses: actions/upload-artifact@v4
        with:
          name: ps04-report
          path: ps04_report.json
          retention-days: 30
