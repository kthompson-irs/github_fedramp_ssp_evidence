name: FedRAMP PS-04 GitHub Offboarding Verification

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"

permissions:
  contents: read

jobs:
  ps04-check:
    runs-on: ubuntu-latest

    env:
      PYTHON_SCRIPT: scripts/github_ps04_checker.py
      POPULATE_SCRIPT: scripts/populate_terminations_csv.py
      TERMINATIONS_SOURCE: data/terminations_source.csv
      TERMINATIONS_FILE: data/terminations.csv
      OUTPUT_FILE: ps04_report.json
      GH_ENTERPRISE_SLUG: ${{ secrets.GH_ENTERPRISE_SLUG }}
      GH_AUDIT_TOKEN: ${{ secrets.GH_AUDIT_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Precheck
        run: |
          set -euo pipefail

          if [ ! -f "$PYTHON_SCRIPT" ]; then
            echo "Missing Python script"
            exit 1
          fi

          if [ ! -f "$POPULATE_SCRIPT" ]; then
            echo "Missing populate script"
            exit 1
          fi

          if [ -z "${GH_ENTERPRISE_SLUG:-}" ]; then
            echo "Missing GH_ENTERPRISE_SLUG"
            exit 1
          fi

          if [ -z "${GH_AUDIT_TOKEN:-}" ]; then
            echo "Missing GH_AUDIT_TOKEN"
            exit 1
          fi

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          pip install requests

      - name: Generate termination CSV
        run: |
          python "$POPULATE_SCRIPT" \
            --source "$TERMINATIONS_SOURCE" \
            --output "$TERMINATIONS_FILE"

      - name: Run PS-04 check
        run: |
          python "$PYTHON_SCRIPT" \
            --terminations "$TERMINATIONS_FILE" \
            --output "$OUTPUT_FILE"

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: ps04-report
          path: ps04_report.json
