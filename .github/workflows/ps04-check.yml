name: FedRAMP PS-04 GitHub Offboarding Verification

on:
  workflow_dispatch:
    inputs:
      sla_minutes:
        description: "PS-04 SLA in minutes"
        required: false
        default: "60"
      terminations_json:
        description: "Inline JSON array used to build data/terminations.csv"
        required: false
        default: ""
      terminations_source:
        description: "Optional source file path"
        required: false
        default: "data/terminations_source.csv"
      enterprise_audit_log_file:
        description: "Enterprise audit log file"
        required: false
        default: ""
      security_log_file:
        description: "Security log file"
        required: false
        default: ""
      scim_log_file:
        description: "SCIM log file"
        required: false
        default: ""

  schedule:
    - cron: "0 * * * *"

permissions:
  contents: read

jobs:
  ps04-check:
    runs-on: ubuntu-22.04

    env:
      BUILD_SCRIPT: scripts/build_terminations_csv.py
      CHECK_SCRIPT: scripts/github_ps04_checker.py

      TERMINATIONS_FILE: data/terminations.csv
      TERMINATIONS_SOURCE: ${{ github.event.inputs.terminations_source || 'data/terminations_source.csv' }}
      TERMINATIONS_JSON: ${{ github.event.inputs.terminations_json || '' }}

      ENTERPRISE_AUDIT_LOG_FILE: ${{ github.event.inputs.enterprise_audit_log_file || '' }}
      SECURITY_LOG_FILE: ${{ github.event.inputs.security_log_file || '' }}
      SCIM_LOG_FILE: ${{ github.event.inputs.scim_log_file || '' }}

      OUTPUT_FILE: ps04_report.json
      SLA_MINUTES: ${{ github.event.inputs.sla_minutes || '60' }}

    steps:
      - uses: actions/checkout@v4

      - name: Precheck
        run: |
          set -euo pipefail
          test -f "$BUILD_SCRIPT" || exit 1
          test -f "$CHECK_SCRIPT" || exit 1
          mkdir -p data

          if [ -z "${TERMINATIONS_JSON:-}" ] && [ ! -f "$TERMINATIONS_SOURCE" ]; then
            echo "Missing termination source"
            exit 1
          fi

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11.8"

      - name: Install deps
        run: pip install requests==2.31.0

      - name: Build dataset
        run: |
          set -euo pipefail

          if [ -n "${TERMINATIONS_JSON:-}" ]; then
            python "$BUILD_SCRIPT" \
              --output "$TERMINATIONS_FILE"
          else
            python "$BUILD_SCRIPT" \
              --source "$TERMINATIONS_SOURCE" \
              --output "$TERMINATIONS_FILE"
          fi

      - name: Run PS-04 checker (fixed)
        run: |
          set -euo pipefail

          CMD="python $CHECK_SCRIPT \
            --terminations $TERMINATIONS_FILE \
            --sla-minutes $SLA_MINUTES \
            --fail-on-gaps \
            --output $OUTPUT_FILE"

          if [ -n "${ENTERPRISE_AUDIT_LOG_FILE:-}" ] && [ -f "$ENTERPRISE_AUDIT_LOG_FILE" ]; then
            CMD="$CMD --enterprise-audit-log $ENTERPRISE_AUDIT_LOG_FILE"
          fi

          if [ -n "${SECURITY_LOG_FILE:-}" ] && [ -f "$SECURITY_LOG_FILE" ]; then
            CMD="$CMD --security-log $SECURITY_LOG_FILE"
          fi

          if [ -n "${SCIM_LOG_FILE:-}" ] && [ -f "$SCIM_LOG_FILE" ]; then
            CMD="$CMD --scim-log $SCIM_LOG_FILE"
          fi

          echo "$CMD"
          eval $CMD

      - name: Show report
        run: cat "$OUTPUT_FILE"

      - uses: actions/upload-artifact@v4
        with:
          name: ps04-report
          path: ps04_report.json
