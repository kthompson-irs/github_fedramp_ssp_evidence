name: PS-04 Real-Time Evidence Pipeline

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ps04:
    runs-on: ubuntu-22.04

    env:
      GH_ENTERPRISE_SLUG: ${{ secrets.GH_ENTERPRISE_SLUG }}
      GH_AUDIT_TOKEN: ${{ secrets.GH_AUDIT_TOKEN }}

      OKTA_DOMAIN: ${{ secrets.OKTA_DOMAIN }}
      OKTA_TOKEN: ${{ secrets.OKTA_TOKEN }}

      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: us-east-1

      SPLUNK_HEC_URL: ${{ secrets.SPLUNK_HEC_URL }}
      SPLUNK_HEC_TOKEN: ${{ secrets.SPLUNK_HEC_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          pip install requests boto3

      # 🔹 Pull real evidence
      - name: Fetch GitHub audit logs
        run: python scripts/fetch_github_audit_logs.py

      - name: Fetch SCIM events
        run: python scripts/fetch_scim_events.py

      # 🔹 Build termination dataset
      - name: Build dataset
        run: |
          python scripts/build_terminations_csv.py \
            --source data/terminations_source.csv \
            --output data/terminations.csv

      # 🔹 Run compliance check
      - name: Run PS-04 check
        run: |
          python scripts/github_ps04_checker.py \
            --terminations data/terminations.csv \
            --enterprise-audit-log data/enterprise_audit_log.json \
            --scim-log data/scim_log.json \
            --fail-on-gaps \
            --output ps04_report.json

      # 🔹 Evidence storage
      - name: Upload to S3 (immutable)
        run: python scripts/push_to_s3.py

      # 🔹 SIEM
      - name: Send to Splunk
        run: bash scripts/send_to_splunk.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ps04-report
          path: ps04_report.json
