name: SA-04(10) Security Gate and FedRAMP Package

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      alert_scope:
        description: "Alert scope to audit"
        required: false
        type: choice
        default: repository
        options:
          - repository
          - organization
          - enterprise
      enterprise_slug:
        description: "Enterprise slug, required when alert_scope=enterprise"
        required: false
        default: ""
      fail_on_severity:
        description: "Severity threshold (low, medium, high, critical)"
        required: false
        default: "high"

permissions:
  contents: read
  security-events: write
  actions: read
  pull-requests: read

jobs:
  build-evidence-package:
    name: SA-04(10) Security Gate + FedRAMP Package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install --upgrade pip requests

      - name: Dependency Review
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: ${{ github.event.inputs.fail_on_severity || 'high' }}

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Analyze and upload CodeQL results
        uses: github/codeql-action/analyze@v3
        with:
          upload: always
          wait-for-processing: true

      - name: Poll GitHub security alerts and collect evidence
        env:
          GH_ALERT_SCOPE: ${{ github.event.inputs.alert_scope }}
          GH_ENTERPRISE_SLUG: ${{ github.event.inputs.enterprise_slug }}
          GH_REPOSITORY: ${{ github.repository }}
          GH_ORG_NAME: ${{ github.repository_owner }}
          GH_DEPENDABOT_TOKEN: ${{ secrets.GH_DEPENDABOT_TOKEN }}
          GH_APP_TOKEN: ${{ secrets.GH_APP_TOKEN }}
          GH_ENTERPRISE_TOKEN: ${{ secrets.GH_ENTERPRISE_TOKEN }}
          FAIL_ON_SEVERITY: ${{ github.event.inputs.fail_on_severity || 'high' }}
          SA04_SOFT_FAIL: "1"
        run: |
          python scripts/gh_sa_04_10_poll_alerts.py \
            --scope "${GH_ALERT_SCOPE:-repository}" \
            --enterprise "${GH_ENTERPRISE_SLUG:-}" \
            --output-dir artifacts/sa-04-10 \
            --soft-fail

      - name: Build FedRAMP submission package
        if: always()
        run: python scripts/build_fedramp_submission_package.py --input-dir artifacts/sa-04-10 --output-dir fedramp_ato_package

      - name: Upload FedRAMP submission package
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fedramp-ato-package
          path: |
            fedramp_ato_package
            artifacts/sa-04-10

      - name: Enforce SA-04(10) result
        if: always()
        run: |
          python - <<'PY'
          import json
          import sys
          from pathlib import Path

          summary_path = Path("artifacts/sa-04-10/summary.json")
          if not summary_path.exists():
              print("SA-04(10) COMPLIANCE FAILURE: summary.json was not produced.")
              sys.exit(2)

          summary = json.loads(summary_path.read_text(encoding="utf-8"))
          overall = summary.get("overall", {})
          error_count = int(overall.get("error_count", 0))
          blocking_count = int(overall.get("blocking_count", 0))

          if blocking_count > 0:
              print(f"SA-04(10) COMPLIANCE FAILURE: {blocking_count} blocking finding(s) were detected.")
              sys.exit(1)

          if error_count > 0:
              print(f"SA-04(10) COMPLIANCE WARNING: {error_count} collection error(s) were recorded, but the package was still built.")

          print("SA-04(10) COMPLIANCE PASS: no blocking findings were detected.")
          PY
