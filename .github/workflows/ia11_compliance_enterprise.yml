name: IA-11 FedRAMP Enterprise Evidence Check

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"

jobs:
  ia-evidence:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      GH_ENTERPRISE: ${{ secrets.GH_ENTERPRISE }}
      GH_ENTERPRISE_TOKEN: ${{ secrets.GH_ENTERPRISE_TOKEN }}
      GH_API_URL: https://api.github.com
      OUTPUT_DIR: artifacts
      SINCE_DAYS: "30"
      IDP_POLICY_FILE: evidence/idp/idp_policy.json
      ENTERPRISE_SECURITY_FILE: evidence/github/enterprise_security.json
      MANUAL_EVIDENCE_DIR: evidence/manual

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Preflight - identify token and enterprise audit-log access
        run: |
          python - <<'PY'
          import os, json
          from urllib.request import Request, urlopen
          from urllib.error import HTTPError

          api = os.environ.get("GH_API_URL", "https://api.github.com").rstrip("/")
          token = os.environ.get("GH_ENTERPRISE_TOKEN")
          enterprise = os.environ.get("GH_ENTERPRISE")

          def call(path):
              req = Request(
                  f"{api}{path}",
                  headers={
                      "Authorization": f"Bearer {token}",
                      "Accept": "application/vnd.github+json",
                      "X-GitHub-Api-Version": "2022-11-28",
                  },
              )
              try:
                  with urlopen(req) as r:
                      body = r.read().decode()
                      try:
                          return r.status, json.loads(body)
                      except Exception:
                          return r.status, body
              except HTTPError as e:
                  raw = e.read().decode(errors="replace")
                  try:
                      return e.code, json.loads(raw)
                  except Exception:
                      return e.code, raw

          print("=== AUTHENTICATED USER ===")
          status, user = call("/user")
          print("Status:", status)
          print(json.dumps(user, indent=2) if isinstance(user, dict) else user)

          print("\n=== ENTERPRISE AUDIT LOG TEST ===")
          status, logs = call(f"/enterprises/{enterprise}/audit-log?per_page=1&include=all&order=desc")
          print("Status:", status)
          print(json.dumps(logs, indent=2) if isinstance(logs, (dict, list)) else logs)

          if status == 200:
              print("\nAudit log access confirmed")
          elif status == 404:
              print("\n404 means the token user cannot access this enterprise audit log")
          elif status == 403:
              print("\n403 means the token is missing audit_log permission or SSO authorization")
          else:
              print(f"\nUnexpected audit log status: {status}")
          PY

      - name: Run IA enterprise compliance
        run: python scripts/ia11_compliance_enterprise.py

      - name: Upload evidence artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ia-enterprise-evidence
          path: artifacts/**
