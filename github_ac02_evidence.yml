---

* name: GitHub AC-02 Evidence Collection Playbook
  hosts: localhost
  gather_facts: no

  vars_files:

  * vars/github_vars.yml

  vars:
  github_api: "https://api.github.com"
  output_dir: "./evidence_output/{{ lookup('pipe', 'date +%Y-%m-%d') }}"

  tasks:

  * name: Create output directory structure
    file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
    loop:

    * "{{ output_dir }}"
    * "{{ output_dir }}/users"
    * "{{ output_dir }}/teams"
    * "{{ output_dir }}/repos"
    * "{{ output_dir }}/audit_logs"

  # ---------------------------

  # ORG MEMBERS

  # ---------------------------

  * name: Get organization members
    uri:
    url: "{{ github_api }}/orgs/{{ github_org }}/members"
    method: GET
    headers:
    Authorization: "Bearer {{ github_token }}"
    Accept: "application/vnd.github+json"
    return_content: yes
    register: org_members

  * name: Save org members
    copy:
    content: "{{ org_members.json | to_nice_json }}"
    dest: "{{ output_dir }}/users/org_members.json"

  # ---------------------------

  # ORG ADMINS

  # ---------------------------

  * name: Get organization admins
    uri:
    url: "{{ github_api }}/orgs/{{ github_org }}/members?role=admin"
    method: GET
    headers:
    Authorization: "Bearer {{ github_token }}"
    Accept: "application/vnd.github+json"
    register: org_admins

  * name: Save org admins
    copy:
    content: "{{ org_admins.json | to_nice_json }}"
    dest: "{{ output_dir }}/users/org_admins.json"

  # ---------------------------

  # TEAMS

  # ---------------------------

  * name: Get teams
    uri:
    url: "{{ github_api }}/orgs/{{ github_org }}/teams"
    method: GET
    headers:
    Authorization: "Bearer {{ github_token }}"
    register: teams

  * name: Save teams
    copy:
    content: "{{ teams.json | to_nice_json }}"
    dest: "{{ output_dir }}/teams/teams.json"

  # ---------------------------

  # TEAM MEMBERS

  # ---------------------------

  * name: Get team members
    uri:
    url: "{{ github_api }}/orgs/{{ github_org }}/teams/{{ item.slug }}/members"
    method: GET
    headers:
    Authorization: "Bearer {{ github_token }}"
    loop: "{{ teams.json }}"
    loop_control:
    label: "{{ item.slug }}"
    register: team_members

  * name: Save team members
    copy:
    content: "{{ team_members.results | to_nice_json }}"
    dest: "{{ output_dir }}/teams/team_members.json"

  # ---------------------------

  # REPOSITORIES

  # ---------------------------

  * name: Get repositories
    uri:
    url: "{{ github_api }}/orgs/{{ github_org }}/repos"
    method: GET
    headers:
    Authorization: "Bearer {{ github_token }}"
    register: repos

  * name: Save repositories
    copy:
    content: "{{ repos.json | to_nice_json }}"
    dest: "{{ output_dir }}/repos/repos.json"

  # ---------------------------

  # COLLABORATORS (EXTERNAL USERS)

  # ---------------------------

  * name: Get repo collaborators
    uri:
    url: "{{ github_api }}/repos/{{ github_org }}/{{ item.name }}/collaborators"
    method: GET
    headers:
    Authorization: "Bearer {{ github_token }}"
    loop: "{{ repos.json }}"
    register: collaborators

  * name: Save collaborators
    copy:
    content: "{{ collaborators.results | to_nice_json }}"
    dest: "{{ output_dir }}/repos/collaborators.json"

  # ---------------------------

  # AUDIT LOGS (ENTERPRISE REQUIRED)

  # ---------------------------

  * name: Get audit logs
    uri:
    url: "{{ github_api }}/orgs/{{ github_org }}/audit-log"
    method: GET
    headers:
    Authorization: "Bearer {{ github_token }}"
    register: audit_logs

  * name: Save audit logs
    copy:
    content: "{{ audit_logs.json | to_nice_json }}"
    dest: "{{ output_dir }}/audit_logs/audit_log.json"

  # ---------------------------

  # SUMMARY REPORT

  # ---------------------------

  * name: Generate summary report
    copy:
    dest: "{{ output_dir }}/summary.txt"
    content: |
    GitHub AC-02 Evidence Collection
    Date: {{ lookup('pipe', 'date') }}

    ```
    Organization: {{ github_org }}

    Files Generated:
    - users/org_members.json
    - users/org_admins.json
    - teams/teams.json
    - teams/team_members.json
    - repos/repos.json
    - repos/collaborators.json
    - audit_logs/audit_log.json

    Notes:
    - Evidence supports AC-02, AC-02(1), AC-02(7), AC-02(10)
    ```
